<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HorizonVideos</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1020;
  color:white;
}

header {
  padding:20px;
  font-size:24px;
  font-weight:bold;
  background:#111a33;
  display:flex;
  justify-content:space-between;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#151f3a;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}
.card:hover { transform:scale(1.03); }

.card img {
  width:100%;
}

.info {
  padding:10px;
}

.small {
  font-size:12px;
  opacity:0.7;
}

#player {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:none;
  flex-direction:column;
}

#player iframe {
  width:100%;
  height:100%;
}

.close {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  border:none;
  color:white;
  padding:10px;
  cursor:pointer;
  z-index:10;
}
</style>
</head>

<body>

<header>
  HorizonVideos
</header>

<div id="videos" class="grid"></div>

<div id="player">
  <button class="close" onclick="closePlayer()">X</button>
  <iframe id="frame" frameborder="0" allowfullscreen></iframe>
</div>

<script src="app.js"></script>

</body>
</html>
